/* ===== PINPARKER LOGIN / CHANGE PASSWORD ===== */
.form,
.change-pass-form {
  position: relative;
  display: block;
  padding: 2.8rem;
  width: 100%;
  max-width: 420px;
  background: linear-gradient(
      14deg,
      rgba(2, 0, 36, 0.82) 0%,
      rgba(24, 24, 65, 0.74) 66%,
      rgb(20, 76, 99) 100%
    ),
    radial-gradient(
      circle,
      rgba(2, 0, 36, 0.5) 0%,
      rgba(32, 15, 53, 0.2) 65%,
      rgba(14, 29, 28, 0.9) 100%
    );
  border: 2px solid #fff;
  box-shadow: rgba(0, 212, 255, 0.65) 0px 0px 50px -15px;
  overflow: hidden;
  z-index: 1;
  border-radius: 16px;
  box-sizing: border-box;
}

.form-title,
.change-pass-heading-top {
  font-size: 1.15rem;
  line-height: 1.6rem;
  font-family: monospace;
  font-weight: 600;
  text-align: center;
  color: #fff;
  text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.7);
  overflow: hidden;
}

.form-title span,
.change-pass-heading-top span {
  animation: flickering 2s linear infinite both;
}

.title-2,
.change-pass-title-2 {
  display: block;
  margin-top: -0.5rem;
  margin-bottom: 1rem;
  font-size: 2.1rem;
  font-weight: 800;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
  -webkit-text-stroke: #fff 0.08rem;
  letter-spacing: 0.2rem;
  color: transparent;
  position: relative;
  text-shadow: 0 0 16px #cecece;
}

.title-2 span::before,
.title-2 span::after,
.change-pass-title-2 span::before,
.change-pass-title-2 span::after {
  content: "—";
}

.input-container {
  position: relative;
}

.input-container input,
.form button,
.change-pass-form button {
  outline: none;
  border: 2px solid #ffffff;
  margin: 8px 0;
  font-family: monospace;
  border-radius: 6px;
}

.input-container input {
  background-color: #fff;
  padding: 10px 12px;
  font-size: 0.95rem;
  line-height: 1.25rem;
  width: 100%;
  box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  box-sizing: border-box;
}

.input-container input:focus::placeholder {
  opacity: 0;
  transition: opacity 0.4s;
}

.submit,
.change-pass-submit,
.change-pass-cancel {
  position: relative;
  display: block;
  padding: 10px;
  color: #ffffff;
  text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
  font-size: 0.9rem;
  line-height: 1.25rem;
  font-weight: 600;
  width: 100%;
  text-transform: uppercase;
  overflow: hidden;
  cursor: pointer;
}

.submit,
.change-pass-submit {
  background: linear-gradient(90deg, #243949 0%, #517fa4 100%);
}

.change-pass-cancel {
  background: linear-gradient(90deg, #2d3748 0%, #4a5568 100%);
}

.submit:hover,
.change-pass-submit:hover,
.change-pass-cancel:hover {
  transition: all 0.2s ease-out;
  box-shadow: 4px 5px 17px -4px #ffffff;
}

.submit:hover::before,
.change-pass-submit:hover::before,
.change-pass-cancel:hover::before {
  animation: sh02 0.5s 0s linear;
}

.submit::before,
.change-pass-submit::before,
.change-pass-cancel::before {
  content: "";
  display: block;
  width: 0px;
  height: 85%;
  position: absolute;
  top: 50%;
  left: 0%;
  opacity: 0;
  background: #fff;
  box-shadow: 0 0 50px 30px #fff;
  transform: skewX(-20deg);
}

.forgot,
.signup-link {
  color: #c0c0c0;
  font-size: 0.875rem;
  line-height: 1.25rem;
  text-align: center;
  font-family: monospace;
  margin-top: 6px;
}

.forgot a,
.signup-link a {

  text-decoration: none;
}

.forgot a:hover,
.signup-link a:hover {

}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.48);
  z-index: 2000;

}

.modal-overlay.show {
  display: flex;

}

.change-pass-actions {

}

.bg-stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  background-size: cover;
  animation: animateBg 50s linear infinite;
}

.star {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1),
    0 0 0 8px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 0.1);
  animation: animate 3s linear infinite;
}

.star::before {
  content: "";
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 300px;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
}

.star:nth-child(1) { top: 0; right: 0; left: auto; animation-delay: 0s; animation-duration: 1s; }
.star:nth-child(2) { top: 0; right: 100px; left: auto; animation-delay: 0.2s; animation-duration: 3s; }
.star:nth-child(3) { top: 0; right: 220px; left: auto; animation-delay: 2.75s; animation-duration: 2.75s; }
.star:nth-child(4) { top: 0; right: -220px; left: auto; animation-delay: 1.6s; animation-duration: 1.6s; }

@keyframes flickering {
  0%,100% { opacity: 1; }
  41.99% { opacity: 1; }
  42%,43% { opacity: 0; }
  43.01% { opacity: 1; }
  47.99% { opacity: 1; }
  48%,49% { opacity: 0; }
  49.01% { opacity: 1; }
}

@keyframes animateBg {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

@keyframes animate {
  0% { transform: rotate(315deg) translateX(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
}

@keyframes sh02 {
  from { opacity: 0; left: 0%; }
  50% { opacity: 1; }
  to { opacity: 0; left: 100%; }
}

@media (max-width: 768px) {

/* ===== HAMSTER ===== */
.wheel-and-hamster {
  --dur: 1s;
  position: relative;
  width: 12em;
  height: 12em;
  font-size: 14px;
}

.wheel,
.hamster,
.hamster div,
.spoke {
  position: absolute;
}

.wheel,
.spoke {
  border-radius: 50%;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.wheel {
  background: radial-gradient(100% 100% at center,hsla(0,0%,60%,0) 47.8%,hsl(0,0%,60%) 48%);
  z-index: 2;
}

.hamster {
  animation: hamster var(--dur) ease-in-out infinite;
  top: 50%;
  left: calc(50% - 3.5em);
  width: 7em;
  height: 3.75em;
  transform: rotate(4deg) translate(-0.8em,1.85em);
  transform-origin: 50% 0;
  z-index: 1;
}

.hamster__head {
  animation: hamsterHead var(--dur) ease-in-out infinite;
  background: hsl(30,90%,55%);
  border-radius: 70% 30% 0 100% / 40% 25% 25% 60%;
  box-shadow: 0 -0.25em 0 hsl(30,90%,80%) inset,
    0.75em -1.55em 0 hsl(30,90%,90%) inset;
  top: 0;
  left: -2em;
  width: 2.75em;
  height: 2.5em;
  transform-origin: 100% 50%;
}

.hamster__ear {
  animation: hamsterEar var(--dur) ease-in-out infinite;
  background: hsl(0,90%,85%);
  border-radius: 50%;
  box-shadow: -0.25em 0 hsl(30,90%,55%) inset;
  top: -0.25em;
  right: -0.25em;
  width: 0.75em;
  height: 0.75em;
  transform-origin: 50% 75%;
}

.hamster__eye {
  animation: hamsterEye var(--dur) linear infinite;
  background-color: hsl(0,0%,0%);
  border-radius: 50%;
  top: 0.375em;
  left: 1.25em;
  width: 0.5em;
  height: 0.5em;
}

.hamster__nose {
  background: hsl(0,90%,75%);
  border-radius: 35% 65% 85% 15% / 70% 50% 50% 30%;
  top: 0.75em;
  left: 0;
  width: 0.2em;
  height: 0.25em;
}

.hamster__body {
  animation: hamsterBody var(--dur) ease-in-out infinite;
  background: hsl(30,90%,90%);
  border-radius: 50% 30% 50% 30% / 15% 60% 40% 40%;
  box-shadow: 0.1em 0.75em 0 hsl(30,90%,55%) inset,
    0.15em -0.5em 0 hsl(30,90%,80%) inset;
  top: 0.25em;
  left: 2em;
  width: 4.5em;
  height: 3em;
  transform-origin: 17% 50%;
  transform-style: preserve-3d;
}

.hamster__limb--fr,
.hamster__limb--fl {
  clip-path: polygon(0 0,100% 0,70% 80%,60% 100%,0% 100%,40% 80%);
  top: 2em;
  left: 0.5em;
  width: 1em;
  height: 1.5em;
  transform-origin: 50% 0;
}

.hamster__limb--fr {
  animation: hamsterFRLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,80%) 80%,hsl(0,90%,75%) 80%);
  transform: rotate(15deg) translateZ(-1px);
}

.hamster__limb--fl {
  animation: hamsterFLLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,90%) 80%,hsl(0,90%,85%) 80%);
  transform: rotate(15deg);
}

.hamster__limb--br,
.hamster__limb--bl {
  border-radius: 0.75em 0.75em 0 0;
  clip-path: polygon(0 0,100% 0,100% 30%,70% 90%,70% 100%,30% 100%,40% 90%,0% 30%);
  top: 1em;
  left: 2.8em;
  width: 1.5em;
  height: 2.5em;
  transform-origin: 50% 30%;
}

.hamster__limb--br {
  animation: hamsterBRLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,80%) 90%,hsl(0,90%,75%) 90%);
  transform: rotate(-25deg) translateZ(-1px);
}

.hamster__limb--bl {
  animation: hamsterBLLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,90%) 90%,hsl(0,90%,85%) 90%);
  transform: rotate(-25deg);
}

.hamster__tail {
  animation: hamsterTail var(--dur) linear infinite;
  background: hsl(0,90%,85%);
  border-radius: 0.25em 50% 50% 0.25em;
  box-shadow: 0 -0.2em 0 hsl(0,90%,75%) inset;
  top: 1.5em;
  right: -0.5em;
  width: 1em;
  height: 0.5em;
  transform: rotate(30deg) translateZ(-1px);
  transform-origin: 0.25em 0.25em;
}

.spoke {
  animation: spoke var(--dur) linear infinite;
  background: radial-gradient(100% 100% at center,hsl(0,0%,60%) 4.8%,hsla(0,0%,60%,0) 5%),
    linear-gradient(hsla(0,0%,55%,0) 46.9%,hsl(0,0%,65%) 47% 52.9%,hsla(0,0%,65%,0) 53%) 50% 50% / 99% 99% no-repeat;
}

/* Animations */
@keyframes hamster {
  from, to { transform: rotate(4deg) translate(-0.8em,1.85em); }
  50% { transform: rotate(0) translate(-0.8em,1.85em); }
}
@keyframes hamsterHead {
  from, 25%, 50%, 75%, to { transform: rotate(0); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(8deg); }
}
@keyframes hamsterEye {
  from, 90%, to { transform: scaleY(1); }
  95% { transform: scaleY(0); }
}
@keyframes hamsterEar {
  from, 25%, 50%, 75%, to { transform: rotate(0); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(12deg); }
}
@keyframes hamsterBody {
  from, 25%, 50%, 75%, to { transform: rotate(0); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(-2deg); }
}
@keyframes hamsterFRLimb {
  from, 25%, 50%, 75%, to { transform: rotate(50deg) translateZ(-1px); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(-30deg) translateZ(-1px); }
}
@keyframes hamsterFLLimb {
  from, 25%, 50%, 75%, to { transform: rotate(-30deg); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(50deg); }
}
@keyframes hamsterBRLimb {
  from, 25%, 50%, 75%, to { transform: rotate(-60deg) translateZ(-1px); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(20deg) translateZ(-1px); }
}
@keyframes hamsterBLLimb {
  from, 25%, 50%, 75%, to { transform: rotate(20deg); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(-60deg); }
}
@keyframes hamsterTail {
  from, 25%, 50%, 75%, to { transform: rotate(30deg) translateZ(-1px); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(10deg) translateZ(-1px); }
}
@keyframes spoke {
  from { transform: rotate(0); }
  to { transform: rotate(-1turn); }
}

/* Hiệu ứng riêng cho nút Chấm công / Báo cáo tháng */
.nav-btn.nav-fx {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  background: #183153;
  font-family: "Montserrat", sans-serif;
  box-shadow: 0px 6px 24px 0px rgba(0, 0, 0, 0.2);
  overflow: hidden;
  cursor: pointer;
  border: none;
  min-width: 170px;
  padding: 0;
}

.nav-btn.nav-fx::after {
  content: "";
  width: 0%;
  height: 100%;
  background: #ffd401;
  position: absolute;
  transition: all 0.4s ease-in-out;
  right: 0;
  top: 0;
}

.nav-btn.nav-fx:hover::after {
  right: auto;
  left: 0;
  width: 100%;
}

.nav-btn.nav-fx span {
  text-align: center;
  text-decoration: none;
  width: 100%;
  padding: 14px 20px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.12em;
  z-index: 2;
  transition: all 0.3s ease-in-out;
  position: relative;
}

.nav-btn.nav-fx:hover span {
  color: #183153;
  animation: navScaleUp 0.3s ease-in-out;
}

.nav-btn.nav-fx.active {
  background: #183153;
}

.nav-btn.nav-fx.active span {
  color: #fff;
}

@keyframes navScaleUp {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(0.95);
  }
  100% {
    transform: scale(1);
  }
}

.btn-save-hacker .overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, transparent 70%);
  opacity: 0;
  z-index: 1;
  animation: savePulse 3s infinite ease-in-out;
}

.btn-save-hacker .particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.btn-save-hacker .particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: rgba(255,255,255,0.75);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.btn-save-hacker .particle-1 { top: 15%; left: 25%; animation: saveParticle1 1.8s infinite; }
.btn-save-hacker .particle-2 { top: 35%; left: 65%; animation: saveParticle2 2.2s infinite; }
.btn-save-hacker .particle-3 { top: 55%; left: 45%; animation: saveParticle3 1.6s infinite; }
.btn-save-hacker .particle-4 { top: 75%; left: 15%; animation: saveParticle4 2s infinite; }
.btn-save-hacker .particle-5 { top: 25%; left: 85%; animation: saveParticle5 2.1s infinite; }

.btn-save-hacker .click-particle {
  position: absolute;
  width: 7px;
  height: 7px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  opacity: 0;
  z-index: 2;
}

.btn-save-hacker .click-1 { top: 50%; left: 50%; animation: saveClick1 0.5s ease-out; }
.btn-save-hacker .click-2 { top: 40%; left: 60%; animation: saveClick2 0.5s ease-out; }
.btn-save-hacker .click-3 { top: 60%; left: 40%; animation: saveClick3 0.5s ease-out; }
.btn-save-hacker .click-4 { top: 30%; left: 50%; animation: saveClick4 0.5s ease-out; }

.btn-save-hacker .border-anim {
  position: absolute;
  top: 3px;
  left: 3px;
  right: 3px;
  bottom: 3px;
  border: 1px dashed rgba(255,255,255,0.45);
  border-radius: 999px;
  opacity: 0.55;
  animation: saveBorderLeap 2s infinite linear;
  z-index: 1;
}

.btn-save-hacker:hover {
  box-shadow:
    0 0 18px rgba(255,255,255,0.18),
    0 8px 25px rgba(16, 185, 129, 0.48) !important;
  transform: translateX(-50%) translateY(-2px) scale(1.01);
}

.btn-save-hacker:hover::after,
.btn-save-hacker:hover .overlay {
  opacity: 1;
}

.btn-save-hacker:hover .particle {
  opacity: 0.85;
}

.btn-save-hacker:hover span {
  animation: saveGlitchText 0.3s linear infinite;
}

.btn-save-hacker:active {
  transform: translateX(-50%) scale(0.98);
}

.btn-save-hacker:active .click-particle {
  opacity: 1;
}

/* ===== HEADER USER BAR - HIỆU ỨNG KHÔNG GIAN ===== */
.app-header-space {
  position: sticky !important;
  top: 0;
  overflow: hidden !important;
  background: #171717 !important;
  border-radius: 0 !important;
  isolation: isolate;
}

/* lớp glow nền */
.app-header-space::before {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 0;
  background: radial-gradient(rgba(133,133,133,0.45), transparent, transparent);
  transform: translate(-5px, 250px);
  transition: 0.4s ease-in-out;
  z-index: 0;
}

.app-header-space:hover::before {
  width: 130%;
  height: 100%;
  margin-left: -4.25em;
}

/* lớp nền trong */
.app-header-space::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);

/* nội dung nổi lên trên */

  z-index: 2;

    let sessionToken = "";

async function apiPost(payload, expectJson) {
    const body = Object.assign({}, payload);
    if (sessionToken && body.action !== "login") {
        body.token = sessionToken;
    }

    const res = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(body)
    });

    return expectJson ? await res.json() : await res.text();
}

}

function showDinoSavingPopup(message) {

function closeDinoSavingPopup() {

let currentReportMonth = new Date().toISOString().slice(0, 7);

function initReportMonth() {
    const el = document.getElementById('report-month');
    if (!el) return;

    if (!el.value) {
        el.value = currentReportMonth;
    }

    currentReportMonth = el.value;
    setThongKeTitle();
}

function getSelectedReportMonth() {
    const el = document.getElementById('report-month');
    if (!el) return currentReportMonth;

    currentReportMonth = el.value || currentReportMonth || new Date().toISOString().slice(0, 7);
    return currentReportMonth;
}

function setThongKeTitle() {
    const title = document.getElementById('thongke-title');
    if (!title) return;

    const month = getSelectedReportMonth();
    const parts = month.split('-');

    if (parts.length === 2) {
        title.innerText = `DỮ LIỆU CÔNG THÁNG ${parts[1]}/${parts[0]}`;
    } else {
        title.innerText = "DỮ LIỆU CÔNG THÁNG";
    }
}

function getReportMonthFromRow(row) {
    if (!row) return "";

    const possibleDateKeys = [
        "ngay",
        "Ngày",
        "NGÀY",
        "date",
        "Date",
        "ngayCham",
        "ngay_cham",
        "timestamp",
        "createdAt",
        "created_at",
        "time",
        "thoigian",
        "thoiGian"
    ];

    let raw = "";

    for (const key of possibleDateKeys) {
        if (row[key] !== undefined && row[key] !== null && row[key] !== "") {
            raw = row[key];
            break;
        }
    }

    // Nếu chưa thấy theo tên cột, quét toàn bộ giá trị để tìm chuỗi giống ngày.
    if (!raw && typeof row === "object") {
        for (const value of Object.values(row)) {
            if (value === undefined || value === null) continue;
            const s = value.toString().trim();

            if (
                /^\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(s) ||
                /^\d{1,2}[-/]\d{1,2}[-/]\d{4}/.test(s) ||
                s.includes("GMT") ||
                s.includes("T")
            ) {
                raw = value;
                break;
            }
        }
    }

    if (!raw) return "";

    if (raw instanceof Date && !isNaN(raw)) {
        const y = raw.getFullYear();
        const m = String(raw.getMonth() + 1).padStart(2, "0");
        return `${y}-${m}`;
    }

    const str = raw.toString().trim();

    // Dạng ISO: 2026-04-20 hoặc 2026/04/20
    let m1 = str.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
    if (m1) {
        return `${m1[1]}-${String(m1[2]).padStart(2, "0")}`;
    }

    // Dạng Việt Nam: 20/04/2026 hoặc 20-04-2026
    let m2 = str.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
    if (m2) {
        return `${m2[3]}-${String(m2[2]).padStart(2, "0")}`;
    }

    // Dạng Date string / ISO từ Google Sheet
    const d = new Date(str);
    if (!isNaN(d)) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        return `${y}-${m}`;
    }

    return "";
}

/* =========================
   CÔNG ĐOẠN - RENDER + LƯU
   Dữ liệu lấy từ serverData.congdoan do Apps Script trả về.
   Hỗ trợ 2 dạng:
   1) Object: {chuyen, congdoan, taikhoan, congnhan, canbo, nghiviec, canbu, isSaved}
   2) Array:  [chuyen, congdoan, taikhoan, congnhan, canbo, nghiviec, canbu, rowIndex, isSaved]
========================= */
function htmlEscape(value) {
    return (value === undefined || value === null ? "" : value.toString())
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function normalizeCongDoanCellValue(value) {
    const text = value === undefined || value === null ? "" : value.toString().trim();
    return text === "-" ? "" : text;
}

function hasRealCongDoanValue(value) {
    const text = value === undefined || value === null ? "" : value.toString().trim();
    return text !== "" && text !== "-";
}

function normalizeCongDoanRow(row, index) {
    if (Array.isArray(row)) {
        const congnhan = normalizeCongDoanCellValue(row[3]);
        const canbo = normalizeCongDoanCellValue(row[4]);
        const nghiviec = normalizeCongDoanCellValue(row[5]);
        const canbu = normalizeCongDoanCellValue(row[6]);
        return {
            index: index,
            chuyen: row[0] || "",
            congdoan: row[1] || "",
            taikhoan: row[2] || currentUser || "",
            congnhan,
            canbo,
            nghiviec,
            canbu,
            rowIndex: row[7] || "",
            isSaved: row[8] === true || [congnhan, canbo, nghiviec, canbu].some(hasRealCongDoanValue)
        };
    }

    row = row || {};
    const congnhan = normalizeCongDoanCellValue(row.congnhan || row.congNhan || row["CÔNG NHÂN"] || "");
    const canbo = normalizeCongDoanCellValue(row.canbo || row.canBo || row["CÁN BỘ"] || "");
    const nghiviec = normalizeCongDoanCellValue(row.nghiviec || row.nghiViec || row["NGHỈ VIỆC"] || "");
    const canbu = normalizeCongDoanCellValue(row.canbu || row.canBu || row["CẦN BÙ"] || "");

    return {
        index: index,
        chuyen: row.chuyen || row.chuyền || row.CHUYEN || row["CHUYỀN"] || "",
        congdoan: row.congdoan || row.congDoan || row["CÔNG ĐOẠN"] || row["Công Đoạn"] || "",
        taikhoan: row.taikhoan || row.taiKhoan || row.account || row["TÀI KHOẢN"] || currentUser || "",
        congnhan,
        canbo,
        nghiviec,
        canbu,
        rowIndex: row.rowIndex || row.sheetRow || row.row || "",
        isSaved: row.isSaved === true || [congnhan, canbo, nghiviec, canbu].some(hasRealCongDoanValue)
    };
}

function getCongDoanRowsForCurrentUser() {
    const rows = Array.isArray(serverData.congdoan) ? serverData.congdoan : [];
    const user = (currentUser || "").toString().toUpperCase().trim();

    return rows
        .map((row, index) => normalizeCongDoanRow(row, index))
        .filter(row => {
            const acc = (row.taikhoan || "").toString().toUpperCase().trim();
            return currentRole === "ADMIN" || acc === user;
        });
}

function isCongDoanAlreadySaved(rows) {
    return (rows || []).some(row => row.isSaved === true);
}

function setCongDoanSaveButtonState(state) {
    const btn = document.getElementById("btn-save-congdoan");
    if (!btn) return;
    const title = btn.querySelector(".cute-save-title");
    const kicker = btn.querySelector(".cute-save-kicker");
    const setCuteText = (mainText, kickerText) => {
        if (title) {
            title.textContent = mainText;
        } else {
            btn.innerText = mainText;
        }
        if (kicker && kickerText) kicker.textContent = kickerText;
    };

    if (state === "no-access") {
        btn.style.display = "none";
        btn.disabled = true;
        setCuteText("KHÔNG CÓ QUYỀN", "Công đoạn");
        return;
    }

    btn.style.display = "";

    if (state === "saved") {
        btn.disabled = true;
        setCuteText("ĐÃ LƯU", "Công đoạn");
        btn.classList.add("saved");
        return;
    }

    if (state === "saving") {
        btn.disabled = true;
        setCuteText("ĐANG LƯU...", "Công đoạn");
        btn.classList.remove("saved");
        return;
    }

    btn.disabled = false;
    setCuteText("LƯU CÔNG ĐOẠN", "Công đoạn");
    btn.classList.remove("saved");
}

function bindCongDoanInputEvents() {

            const card = input.closest(".congdoan-card");
            if (card) updateCongDoanCardState(card);
        });
    });

    document.querySelectorAll("#congdoan-list .congdoan-card").forEach(updateCongDoanCardState);
}

function updateCongDoanCardState(card) {
    const hasValue = Array.from(card.querySelectorAll(".congdoan-input"))
        .some(input => input.value.trim() !== "");

    if (hasValue) {
        card.classList.add("has-input");
    } else {
        card.classList.remove("has-input");
    }
}

function collectCongDoanPayload() {
    const rows = getCongDoanRowsForCurrentUser();

    if (rows.length === 0) {
        alert("Không có quyền truy cập Công Đoạn!");
        return null;
    }

    if (isCongDoanAlreadySaved(rows)) {
        alert("Đã lưu công đoạn hôm nay rồi, không thể lưu tiếp!");
        setCongDoanSaveButtonState("saved");
        return null;
    }

    const payloadRows = [];
    let hasInvalid = false;
    let invalidMsg = "";

    document.querySelectorAll("#congdoan-list .congdoan-card").forEach(card => {
        const index = Number(card.dataset.index);
        const base = rows.find(r => Number(r.index) === index);
        if (!base) return;

        const item = {
            index: base.index,
            rowIndex: base.rowIndex || "",
            chuyen: base.chuyen || "",
            congdoan: base.congdoan || "",
            taikhoan: base.taikhoan || currentUser || "",
            congnhan: "",
            canbo: "",
            nghiviec: "",
            canbu: ""
        };

        card.querySelectorAll(".congdoan-input").forEach(input => {
            const field = input.dataset.field;
            let value = input.value.trim().replace(/,/g, ".");

            if (value !== "" && isNaN(Number(value))) {
                hasInvalid = true;
                invalidMsg = `Ô ${field} của công đoạn "${base.congdoan}" không hợp lệ.`;
                input.style.border = "2px solid var(--danger)";
            } else {
                input.style.border = "none";
            }

            item[field] = value;
        });

        payloadRows.push(item);
    });

    if (hasInvalid) {
        alert(invalidMsg);
        return null;
    }

    const hasAnyValue = payloadRows.some(row =>
        [row.congnhan, row.canbo, row.nghiviec, row.canbu].some(hasRealCongDoanValue)
    );

    if (!hasAnyValue) {
        alert("Vui lòng nhập dữ liệu trước khi lưu công đoạn!");
        return null;
    }

    return payloadRows;
}

async function saveCongDoanData() {
    const rows = collectCongDoanPayload();
    if (!rows) return;

    const btn = document.getElementById("btn-save-congdoan");
    setCongDoanSaveButtonState("saving");

    let lockAfterSave = false;

    try {
        showDinoSavingPopup("Hệ thống đang lưu công đoạn.");

            action: "luu_congdoan",
            data: rows
        }, false);

        closeDinoSavingPopup();
        alert(text || "Đã lưu công đoạn thành công!");

        const lowerText = (text || "").toLowerCase();
        if (lowerText.includes("đã lưu") || lowerText.includes("thành công")) {
            lockAfterSave = true;
        }

        // Cập nhật lại dữ liệu trên trình duyệt để khi đổi tab không mất giá trị vừa nhập.
        if (lockAfterSave && Array.isArray(serverData.congdoan)) {
            rows.forEach(item => {
                const idx = Number(item.index);
                if (!serverData.congdoan[idx]) return;

                if (Array.isArray(serverData.congdoan[idx])) {
                    serverData.congdoan[idx][3] = item.congnhan;
                    serverData.congdoan[idx][4] = item.canbo;
                    serverData.congdoan[idx][5] = item.nghiviec;
                    serverData.congdoan[idx][6] = item.canbu;

                } else {
                    serverData.congdoan[idx].congnhan = item.congnhan;
                    serverData.congdoan[idx].canbo = item.canbo;
                    serverData.congdoan[idx].nghiviec = item.nghiviec;
                    serverData.congdoan[idx].canbu = item.canbu;
                    serverData.congdoan[idx].isSaved = true;
                }
            });

        renderCongDoanList();

        console.error("Lỗi lưu công đoạn:", err);
        closeDinoSavingPopup();
        alert("Lỗi kết nối khi lưu công đoạn!");

    }
}

function renderThongKe() {
    const tkView = document.getElementById('thongke-list');
const searchVal = document.getElementById('search-tk').value.toUpperCase().trim();
const selectedMonth = getSelectedReportMonth();

setThongKeTitle();

let myData = (serverData.thongke || []).filter(r => {
    const accOk = (r.acc || "").toString().toUpperCase().trim() === currentUser;
    if (!accOk) return false;

    const rowMonth = getReportMonthFromRow(r);

    // Không đọc được tháng thì không cho lọt qua,
    // tránh chọn tháng 4 nhưng vẫn hiện dữ liệu tháng 5.
    if (!rowMonth) return false;

    return rowMonth === selectedMonth;
});

if (myData.length === 0) {
    tkView.innerHTML = `<div class="worker-card" style="text-align:center;">Tháng ${selectedMonth} chưa có dữ liệu chấm công nào!</div>`;
    return;
}

    // Chuẩn hóa mã thẻ để dò đúng ca trong DATA
    const normalizeId = v => {
        if (v === undefined || v === null) return "";
        return v.toString().trim();
    };

    // Chuyển giờ về phút.
    // Hỗ trợ: 20:00, 2000, 7:30, 0730, Date ISO từ Google Sheet
    const toMinutes = value => {
        if (value === undefined || value === null || value === "") return null;

        if (value instanceof Date && !isNaN(value)) {
            return value.getHours() * 60 + value.getMinutes();
        }

        if (typeof value === "number") {
            // Google Sheet time dạng số thập phân, ví dụ 0.8333 = 20:00
            if (value > 0 && value < 1) {
                return Math.round(value * 24 * 60);
            }

            // Dạng 20 hoặc 7
            if (value >= 0 && value <= 23) {
                return Math.round(value) * 60;
            }

            // Dạng 2000, 730, 0830
            value = value.toString();
        }

        let str = value.toString().trim();
        if (!str) return null;

        // Nếu là ISO Date từ Google Sheet
        if (str.includes("T")) {
            const d = new Date(str);
            if (!isNaN(d)) {
                return d.getHours() * 60 + d.getMinutes();
            }
        }

        // Dạng có dấu :
        let match = str.match(/(\d{1,2})\s*:\s*(\d{2})/);
        if (match) {
            let h = parseInt(match[1], 10);
            let m = parseInt(match[2], 10);
            if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
                return h * 60 + m;
            }
        }

        // Dạng 2000, 0730, 730
        let digits = str.replace(/\D/g, "");
        if (!digits) return null;

        let h, m;

        if (digits.length >= 4) {
            h = parseInt(digits.substring(0, 2), 10);
            m = parseInt(digits.substring(2, 4), 10);
        } else if (digits.length === 3) {
            h = parseInt(digits.substring(0, 1), 10);
            m = parseInt(digits.substring(1, 3), 10);
        } else if (digits.length <= 2) {
            h = parseInt(digits, 10);
            m = 0;
        }

        if (isNaN(h) || isNaN(m)) return null;
        if (h < 0 || h > 23 || m < 0 || m > 59) return null;

        return h * 60 + m;
    };

    const shiftMap = {};
    serverData.congnhan.forEach(w => {
        const wid = normalizeId(w[0]);

            shiftMap[wid] = w[5] ? w[5].toString().toUpperCase().trim() : "F";

        row.caInDay = shift;

        let minL = toMinutes(row.lenca);

        // Nếu dữ liệu cũ chưa có cột CA thì mới fallback về ca hiện tại trong DATA.
        const isShiftS =
            shift.includes("S") ||
            shift.includes("ĐÊM") ||
            shift.includes("DEM");

        // Ca F: 07:30 -> 16:30
        if (!isShiftS && shift === "F") {
            if (minL !== null && minL < 450 && minL > 300) {
                ot += (450 - minL) / 60;
            }

            if (minX !== null && minX > 990) {
                ot += (minX - 990) / 60;
            }
        }

        // Ca C: 07:30 -> 15:30
        else if (!isShiftS && shift === "C") {
            if (minL !== null && minL < 450 && minL > 300) {
                ot += (450 - minL) / 60;
            }

            if (minX !== null && minX > 930) {
                ot += (minX - 930) / 60;
            }
        }

        // Ca S: 22:00 -> 06:00 hôm sau
        else if (isShiftS) {
            // Vào trước 22:00 thì tính tăng ca trước giờ.
            // Ví dụ: 20:00 -> 22:00 = +2.0h
            if (minL !== null && minL < 1320 && minL > 720) {
                ot += (1320 - minL) / 60;
            }

            // Xuống sau 06:00 thì tính tăng ca sau giờ.
            // Ví dụ: 06:00 -> 08:30 = +2.5h
            if (minX !== null && minX > 360 && minX < 720) {
                ot += (minX - 360) / 60;
            }
        }

        if (row.isSunday) {
            grouped[rowId].sunDays++;
            grouped[rowId].sundayOT += ot;
        } else {
            grouped[rowId].normalDays++;
            grouped[rowId].normalOT += ot;

        grouped[rowId].totalTCT += Number(row.tct) || 0;
        row.calcOTThisDay = ot;

    function renderSuggestions(inputNode) {
  closeAllSuggestions();

  const val = inputNode.value.trim().replace(/\D/g, '');
  let slotsToShow = [...fullTimeSlots];

  if (val !== "") {
    const startsWithHour = [];
    const startsWithRaw = [];
    const includesRaw = [];

    slotsToShow.forEach(time => {
      const hourText = String(parseInt(time.split(':')[0], 10));
      const rawText = time.replace(':', '');

      if (hourText === val || time.startsWith(val + ':')) {
        startsWithHour.push(time);
      } else if (rawText.startsWith(val)) {
        startsWithRaw.push(time);
      } else if (rawText.includes(val)) {
        includesRaw.push(time);
      }
    });

    slotsToShow = [...startsWithHour, ...startsWithRaw, ...includesRaw];
  }

  if (slotsToShow.length === 0) return;

  const wrapper = inputNode.closest('.time-wrapper');
const card = inputNode.closest('.worker-card');
if (card) card.classList.add('suggestion-layer');
  if (!wrapper) return;

  const dropBox = document.createElement("div");
  dropBox.className = "suggestions-box";
  wrapper.appendChild(dropBox);

  slotsToShow.forEach(time => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.innerText = time;

    if (inputNode.value === time) {
      item.classList.add("active-suggestion");
    }

    item.onmousedown = function(e) {
      e.preventDefault();
      inputNode.value = time;
      closeAllSuggestions();
      inputNode.blur();
    };

    item.ontouchstart = function(e) {
      e.preventDefault();
      inputNode.value = time;
      closeAllSuggestions();
      inputNode.blur();
    };

    dropBox.appendChild(item);
  });

  const targetTime = val ? slotsToShow[0] : "07:00";
  const targetIndex = slotsToShow.indexOf(targetTime);
  if (targetIndex >= 0) {
    setTimeout(() => {
      const firstItem = dropBox.querySelector('.suggestion-item');
      const itemHeight = firstItem ? firstItem.offsetHeight + 10 : (window.innerWidth <= 768 ? 70 : 62);
      dropBox.scrollTop = Math.max(0, targetIndex * itemHeight - itemHeight);
    }, 10);
  }
}

function closeAllSuggestions() {
  document.querySelectorAll('.suggestions-box').forEach(box => box.remove());
  document.querySelectorAll('.suggestion-layer').forEach(el => el.classList.remove('suggestion-layer'));
  document.body.classList.remove("suggestion-open");
}

function isInsideSuggestionArea(target) {
  return !!target.closest('.time-wrapper') || !!target.closest('.suggestions-box');
}

document.addEventListener('pointerdown', function(e) {
  if (!isInsideSuggestionArea(e.target)) {
    closeAllSuggestions();
  }
});

document.addEventListener('touchstart', function(e) {
  if (!isInsideSuggestionArea(e.target)) {
    closeAllSuggestions();
  }
}, { passive: true });

document.addEventListener('focusin', function(e) {
  if (!isInsideSuggestionArea(e.target)) {
    closeAllSuggestions();
  }
});

if (window.innerWidth > 768) {
  window.addEventListener("scroll", closeAllSuggestions, true);
  window.addEventListener("resize", closeAllSuggestions);
}

    function formatTime(input) {
        let val = input.value.trim().replace(',', '.'); if (!val) return;
        if (/^\d{3,4}$/.test(val)) { input.value = val.padStart(4, '0').substring(0, 2) + ":" + val.padStart(4, '0').substring(2, 4); return; }
        if (/^\d{1,2}$/.test(val)) input.value = (parseInt(val) < 10 ? "0"+parseInt(val) : parseInt(val)) + ":00";
        else if (/^\d{1,2}\.5$/.test(val)) input.value = (parseInt(val.split('.')[0]) < 10 ? "0"+parseInt(val.split('.')[0]) : parseInt(val.split('.')[0])) + ":30";
    }

    function timeTo6Digits(timeStr) {
        if (!timeStr) return "";
        let clean = timeStr.replace(/\D/g, ''); 
        if (clean.length === 3) clean = "0" + clean; 
        if (clean.length === 4) return "'" + clean + "00";
        return "'" + clean;
    }

    if (typeof renderCongDoanList === "function") {
        const congdoanView = document.getElementById("congdoan-view");
        if (congdoanView && congdoanView.style.display !== "none") {
            renderCongDoanList();
        }
    }

    // 5. Báo thành công sau khi lưu + đồng bộ xong hết
    if (typeof Swal !== "undefined") {
        await Swal.fire({
            icon: "success",
            title: "Đã lưu!",
            text: text || "Dữ liệu tăng ca đã được lưu và đồng bộ.",
            timer: 1600,
            showConfirmButton: false
        });
    } else {
        alert(text || "Đã chấm công thành công!");
    }

} catch (e) {
    console.error("Lỗi lưu tăng ca:", e);

    if (typeof Swal !== "undefined") {
        await Swal.fire({
            icon: "error",
            title: "Lỗi!",
            text: e && e.message ? e.message : "Không thể lưu dữ liệu tăng ca. Vui lòng thử lại."
        });
    } else {
        alert("Lỗi kết nối!");
    }

} finally {
    btn.disabled = false;
    if (saveBtnText) saveBtnText.textContent = "CHẤM CÔNG (LƯU)";
}
}

    async function reloadData() {
    document.getElementById('main-ui').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    try {
        initialDataPromise = null;
        const data = await apiPost({
            action: "load_data",
            month: getSelectedReportMonth()
        }, true);

        if (!data || data.ok === false) {
            alert(data && data.error ? data.error : "Lỗi tải dữ liệu!");
            return;
        }

        serverData = data;
        accountList = Array.isArray(serverData.taikhoan) ? serverData.taikhoan : accountList;
        initialDataPromise = Promise.resolve(serverData);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        renderWorkerList();
        renderThongKe();
    } catch (e) {
        alert("Lỗi tải dữ liệu!");
    }
}

    // =====================================
    // QUẢN LÝ ADMIN
    // =====================================
    function renderAdminList() {
        document.getElementById('admin-user-list').innerHTML = accountList.map((acc, i) => !acc[0] ? "" : `
            <div class="admin-card">
                <div><div style="font-size:16px; font-weight:bold; color:var(--text-main)">${acc[0]}</div><div style="font-size:12px; color:var(--text-muted)">Quyền: <b style="color:${acc[2]=='ADMIN'?'var(--danger)':'var(--success)'}">${acc[2]}</b></div></div>
                <div style="display:flex; gap:8px;"><button class="admin-action-btn btn-edit" onclick="changePass(${i})">Đổi Pass</button><button class="admin-action-btn btn-del" onclick="deleteAccount(${i})">Xóa</button></div>
            </div>`).join('');
    }
    function addAccount() {
        const u = document.getElementById('new-user').value.toUpperCase().trim(), p = document.getElementById('new-pass').value.trim(), r = document.getElementById('new-role').value;
        if(u==="" || p==="") return alert("Vui lòng nhập Tên và Mật khẩu!");
        if(accountList.find(acc => acc[0] && acc[0].toString().toUpperCase() === u)) return alert("Tài khoản đã tồn tại!");
        accountList.push([u, p, r]); document.getElementById('new-user').value = ""; document.getElementById('new-pass').value = ""; alert("Đã thêm tạm thời! Nhớ bấm LƯU THAY ĐỔI."); renderAdminList();
    }
    function deleteAccount(i) { if(confirm(`Xóa tài khoản ${accountList[i][0]}?`)) { accountList.splice(i, 1); renderAdminList(); } }
    function changePass(i) { const newPass = prompt(`Pass mới cho ${accountList[i][0]}:`); if(newPass && newPass.trim() !== "") { accountList[i][1] = newPass.trim(); alert("Đã đổi pass tạm thời! Nhớ LƯU THAY ĐỔI."); } }
    async function saveAdminData() {
    if(!confirm("Xác nhận lưu lên máy chủ?")) return;
    try {
        showDinoSavingPopup("Hệ thống đang lưu thay đổi tài khoản.");
        const text = await apiPost({ action: "quanly_taikhoan", data: accountList }, false);
        closeDinoSavingPopup();
        if (text.toLowerCase().includes("thành công")) {
            alert("Thành công!");
            location.reload();
        } else {
            alert(text);
        }
    } catch (e) {
        closeDinoSavingPopup();
        alert("Lỗi!");
    }
}
function detectStandaloneApp() {
  const isStandalone =
    window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;

  if (isStandalone) {
    document.documentElement.classList.add('standalone-app');
  }
}

function fixSaveButtonInStandalone() {
  const btn = document.getElementById('save-btn');
  if (!btn) return;

  const isStandalone =
    window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;

  if (!isStandalone) return;

  const btnChua = document.getElementById('btn-chua');
  const chamCongView = document.getElementById('chamcong-view');

  const isChuaChamTab =
    btnChua && btnChua.classList.contains('active');

  const isChamCongViewVisible =
    chamCongView && chamCongView.style.display !== 'none';

  if (!isChuaChamTab || !isChamCongViewVisible) {
    btn.style.setProperty('display', 'none', 'important');
    return;
  }

  btn.style.setProperty('display', 'flex', 'important');
  btn.style.setProperty('position', 'fixed', 'important');
  btn.style.setProperty('left', '50%', 'important');
  btn.style.setProperty('bottom', 'calc(72px + env(safe-area-inset-bottom))', 'important');
  btn.style.setProperty('transform', 'translate3d(-50%, 0, 0)', 'important');
  btn.style.setProperty('z-index', '2147483647', 'important');
  btn.style.setProperty('visibility', 'visible', 'important');
  btn.style.setProperty('opacity', '1', 'important');
}
