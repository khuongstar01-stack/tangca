.login-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px 16px;
}


/* ===== PINPARKER LOGIN / CHANGE PASSWORD ===== */
.form,
.change-pass-form {
  position: relative;
  display: block;
  padding: 2.8rem;
  width: 100%;
  max-width: 420px;
  background: linear-gradient(
      14deg,
      rgba(2, 0, 36, 0.82) 0%,
      rgba(24, 24, 65, 0.74) 66%,
      rgb(20, 76, 99) 100%
    ),
    radial-gradient(
      circle,
      rgba(2, 0, 36, 0.5) 0%,
      rgba(32, 15, 53, 0.2) 65%,
      rgba(14, 29, 28, 0.9) 100%
    );
  border: 2px solid #fff;
  box-shadow: rgba(0, 212, 255, 0.65) 0px 0px 50px -15px;
  overflow: hidden;
  z-index: 1;
  border-radius: 16px;
  box-sizing: border-box;
}

.form-title,
.change-pass-heading-top {
  font-size: 1.15rem;
  line-height: 1.6rem;
  font-family: monospace;
  font-weight: 600;
  text-align: center;
  color: #fff;
  text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.7);
  overflow: hidden;
}

.form-title span,
.change-pass-heading-top span {
  animation: flickering 2s linear infinite both;
}

.title-2,
.change-pass-title-2 {
  display: block;
  margin-top: -0.5rem;
  margin-bottom: 1rem;
  font-size: 2.1rem;
  font-weight: 800;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
  -webkit-text-stroke: #fff 0.08rem;
  letter-spacing: 0.2rem;
  color: transparent;
  position: relative;
  text-shadow: 0 0 16px #cecece;
}

.title-2 span::before,
.title-2 span::after,
.change-pass-title-2 span::before,
.change-pass-title-2 span::after {
  content: "—";
}

.input-container {
  position: relative;
}

.input-container input,
.form button,
.change-pass-form button {
  outline: none;
  border: 2px solid #ffffff;
  margin: 8px 0;
  font-family: monospace;
  border-radius: 6px;
}

.input-container input {
  background-color: #fff;
  padding: 10px 12px;
  font-size: 0.95rem;
  line-height: 1.25rem;
  width: 100%;
  box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  box-sizing: border-box;
}

.input-container input:focus::placeholder {
  opacity: 0;
  transition: opacity 0.4s;
}

.submit,
.change-pass-submit,
.change-pass-cancel {
  position: relative;
  display: block;
  padding: 10px;
  color: #ffffff;
  text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
  font-size: 0.9rem;
  line-height: 1.25rem;
  font-weight: 600;
  width: 100%;
  text-transform: uppercase;
  overflow: hidden;
  cursor: pointer;
}

.submit,
.change-pass-submit {
  background: linear-gradient(90deg, #243949 0%, #517fa4 100%);
}

.change-pass-cancel {
  background: linear-gradient(90deg, #2d3748 0%, #4a5568 100%);
}

.submit:hover,
.change-pass-submit:hover,
.change-pass-cancel:hover {
  transition: all 0.2s ease-out;
  box-shadow: 4px 5px 17px -4px #ffffff;
}

.submit:hover::before,
.change-pass-submit:hover::before,
.change-pass-cancel:hover::before {
  animation: sh02 0.5s 0s linear;
}

.submit::before,
.change-pass-submit::before,
.change-pass-cancel::before {
  content: "";
  display: block;
  width: 0px;
  height: 85%;
  position: absolute;
  top: 50%;
  left: 0%;
  opacity: 0;
  background: #fff;
  box-shadow: 0 0 50px 30px #fff;
  transform: skewX(-20deg);
}

.forgot,
.signup-link {
  color: #c0c0c0;
  font-size: 0.875rem;
  line-height: 1.25rem;
  text-align: center;
  font-family: monospace;
  margin-top: 6px;
}

.forgot a,
.signup-link a {
  color: #fff;
  text-decoration: none;
}

.forgot a:hover,
.signup-link a:hover {
  text-decoration: underline;
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.48);
  z-index: 2000;
  padding: 20px;
  box-sizing: border-box;
}

.modal-overlay.show {
  display: flex;
  justify-content: center;
  align-items: center;
}

.change-pass-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.bg-stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  background-size: cover;
  animation: animateBg 50s linear infinite;
}

.star {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1),
    0 0 0 8px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 0.1);
  animation: animate 3s linear infinite;
}

.star::before {
  content: "";
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 300px;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
}

.star:nth-child(1) { top: 0; right: 0; left: auto; animation-delay: 0s; animation-duration: 1s; }
.star:nth-child(2) { top: 0; right: 100px; left: auto; animation-delay: 0.2s; animation-duration: 3s; }
.star:nth-child(3) { top: 0; right: 220px; left: auto; animation-delay: 2.75s; animation-duration: 2.75s; }
.star:nth-child(4) { top: 0; right: -220px; left: auto; animation-delay: 1.6s; animation-duration: 1.6s; }

@keyframes flickering {
  0%,100% { opacity: 1; }
  41.99% { opacity: 1; }
  42%,43% { opacity: 0; }
  43.01% { opacity: 1; }
  47.99% { opacity: 1; }
  48%,49% { opacity: 0; }
  49.01% { opacity: 1; }
}

@keyframes animateBg {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

@keyframes animate {
  0% { transform: rotate(315deg) translateX(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
}

@keyframes sh02 {
  from { opacity: 0; left: 0%; }
  50% { opacity: 1; }
  to { opacity: 0; left: 100%; }
}

@media (max-width: 768px) {
  .form,
  .change-pass-form {
    max-width: 360px;
    padding: 1.6rem;
  }

  .title-2,
  .change-pass-title-2 {
    font-size: 1.8rem;
  }
}
.bg-gradient-grid {

  inset: 0;

.bg-gradient-grid::before {

  background-image: linear-gradient(90deg, #ccc 1px, transparent 1px);
  background-size: 50px 100%;
  pointer-events: none;
  mask-image: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 1) 0%,
    rgba(0, 0, 0, 0) 70%
  );
  -webkit-mask-image: linear-gradient(
    to bottom,

    rgba(0, 0, 0, 0) 70%
  );
}

/* ===== HAMSTER ===== */
.wheel-and-hamster {
  --dur: 1s;
  position: relative;
  width: 12em;
  height: 12em;
  font-size: 14px;
}

.wheel,
.hamster,
.hamster div,
.spoke {
  position: absolute;
}

.wheel,
.spoke {
  border-radius: 50%;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.wheel {
  background: radial-gradient(100% 100% at center,hsla(0,0%,60%,0) 47.8%,hsl(0,0%,60%) 48%);
  z-index: 2;
}

.hamster {
  animation: hamster var(--dur) ease-in-out infinite;
  top: 50%;
  left: calc(50% - 3.5em);
  width: 7em;
  height: 3.75em;
  transform: rotate(4deg) translate(-0.8em,1.85em);
  transform-origin: 50% 0;
  z-index: 1;
}

.hamster__head {
  animation: hamsterHead var(--dur) ease-in-out infinite;
  background: hsl(30,90%,55%);
  border-radius: 70% 30% 0 100% / 40% 25% 25% 60%;
  box-shadow: 0 -0.25em 0 hsl(30,90%,80%) inset,
    0.75em -1.55em 0 hsl(30,90%,90%) inset;
  top: 0;
  left: -2em;
  width: 2.75em;
  height: 2.5em;
  transform-origin: 100% 50%;
}

.hamster__ear {
  animation: hamsterEar var(--dur) ease-in-out infinite;
  background: hsl(0,90%,85%);
  border-radius: 50%;
  box-shadow: -0.25em 0 hsl(30,90%,55%) inset;
  top: -0.25em;
  right: -0.25em;
  width: 0.75em;
  height: 0.75em;
  transform-origin: 50% 75%;
}

.hamster__eye {
  animation: hamsterEye var(--dur) linear infinite;
  background-color: hsl(0,0%,0%);
  border-radius: 50%;
  top: 0.375em;
  left: 1.25em;
  width: 0.5em;
  height: 0.5em;
}

.hamster__nose {
  background: hsl(0,90%,75%);
  border-radius: 35% 65% 85% 15% / 70% 50% 50% 30%;
  top: 0.75em;
  left: 0;
  width: 0.2em;
  height: 0.25em;
}

.hamster__body {
  animation: hamsterBody var(--dur) ease-in-out infinite;
  background: hsl(30,90%,90%);
  border-radius: 50% 30% 50% 30% / 15% 60% 40% 40%;
  box-shadow: 0.1em 0.75em 0 hsl(30,90%,55%) inset,
    0.15em -0.5em 0 hsl(30,90%,80%) inset;
  top: 0.25em;
  left: 2em;
  width: 4.5em;
  height: 3em;
  transform-origin: 17% 50%;
  transform-style: preserve-3d;
}

.hamster__limb--fr,
.hamster__limb--fl {
  clip-path: polygon(0 0,100% 0,70% 80%,60% 100%,0% 100%,40% 80%);
  top: 2em;
  left: 0.5em;
  width: 1em;
  height: 1.5em;
  transform-origin: 50% 0;
}

.hamster__limb--fr {
  animation: hamsterFRLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,80%) 80%,hsl(0,90%,75%) 80%);
  transform: rotate(15deg) translateZ(-1px);
}

.hamster__limb--fl {
  animation: hamsterFLLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,90%) 80%,hsl(0,90%,85%) 80%);
  transform: rotate(15deg);
}

.hamster__limb--br,
.hamster__limb--bl {
  border-radius: 0.75em 0.75em 0 0;
  clip-path: polygon(0 0,100% 0,100% 30%,70% 90%,70% 100%,30% 100%,40% 90%,0% 30%);
  top: 1em;
  left: 2.8em;
  width: 1.5em;
  height: 2.5em;
  transform-origin: 50% 30%;
}

.hamster__limb--br {
  animation: hamsterBRLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,80%) 90%,hsl(0,90%,75%) 90%);
  transform: rotate(-25deg) translateZ(-1px);
}

.hamster__limb--bl {
  animation: hamsterBLLimb var(--dur) linear infinite;
  background: linear-gradient(hsl(30,90%,90%) 90%,hsl(0,90%,85%) 90%);
  transform: rotate(-25deg);
}

.hamster__tail {
  animation: hamsterTail var(--dur) linear infinite;
  background: hsl(0,90%,85%);
  border-radius: 0.25em 50% 50% 0.25em;
  box-shadow: 0 -0.2em 0 hsl(0,90%,75%) inset;
  top: 1.5em;
  right: -0.5em;
  width: 1em;
  height: 0.5em;
  transform: rotate(30deg) translateZ(-1px);
  transform-origin: 0.25em 0.25em;
}

.spoke {
  animation: spoke var(--dur) linear infinite;
  background: radial-gradient(100% 100% at center,hsl(0,0%,60%) 4.8%,hsla(0,0%,60%,0) 5%),
    linear-gradient(hsla(0,0%,55%,0) 46.9%,hsl(0,0%,65%) 47% 52.9%,hsla(0,0%,65%,0) 53%) 50% 50% / 99% 99% no-repeat;
}

/* Animations */
@keyframes hamster {
  from, to { transform: rotate(4deg) translate(-0.8em,1.85em); }
  50% { transform: rotate(0) translate(-0.8em,1.85em); }
}
@keyframes hamsterHead {
  from, 25%, 50%, 75%, to { transform: rotate(0); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(8deg); }
}
@keyframes hamsterEye {
  from, 90%, to { transform: scaleY(1); }
  95% { transform: scaleY(0); }
}
@keyframes hamsterEar {
  from, 25%, 50%, 75%, to { transform: rotate(0); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(12deg); }
}
@keyframes hamsterBody {
  from, 25%, 50%, 75%, to { transform: rotate(0); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(-2deg); }
}
@keyframes hamsterFRLimb {
  from, 25%, 50%, 75%, to { transform: rotate(50deg) translateZ(-1px); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(-30deg) translateZ(-1px); }
}
@keyframes hamsterFLLimb {
  from, 25%, 50%, 75%, to { transform: rotate(-30deg); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(50deg); }
}
@keyframes hamsterBRLimb {
  from, 25%, 50%, 75%, to { transform: rotate(-60deg) translateZ(-1px); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(20deg) translateZ(-1px); }
}
@keyframes hamsterBLLimb {
  from, 25%, 50%, 75%, to { transform: rotate(20deg); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(-60deg); }
}
@keyframes hamsterTail {
  from, 25%, 50%, 75%, to { transform: rotate(30deg) translateZ(-1px); }
  12.5%, 37.5%, 62.5%, 87.5% { transform: rotate(10deg) translateZ(-1px); }
}
@keyframes spoke {
  from { transform: rotate(0); }
  to { transform: rotate(-1turn); }
}

/* Hiệu ứng riêng cho nút Chấm công / Báo cáo tháng */
.nav-btn.nav-fx {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  background: #183153;
  font-family: "Montserrat", sans-serif;
  box-shadow: 0px 6px 24px 0px rgba(0, 0, 0, 0.2);
  overflow: hidden;
  cursor: pointer;
  border: none;
  min-width: 170px;
  padding: 0;
}

.nav-btn.nav-fx::after {
  content: "";
  width: 0%;
  height: 100%;
  background: #ffd401;
  position: absolute;
  transition: all 0.4s ease-in-out;
  right: 0;
  top: 0;
}

.nav-btn.nav-fx:hover::after {
  right: auto;
  left: 0;
  width: 100%;
}

.nav-btn.nav-fx span {
  text-align: center;
  text-decoration: none;
  width: 100%;
  padding: 14px 20px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.12em;
  z-index: 2;
  transition: all 0.3s ease-in-out;
  position: relative;
}

.nav-btn.nav-fx:hover span {
  color: #183153;
  animation: navScaleUp 0.3s ease-in-out;
}

.nav-btn.nav-fx.active {
  background: #183153;
}

.nav-btn.nav-fx.active span {
  color: #fff;
}

@keyframes navScaleUp {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(0.95);
  }
  100% {
    transform: scale(1);
  }
}

<div id="change-pass-modal" class="modal-overlay" onclick="if(event.target === this) closeChangePassword()">
  <form class="change-pass-form" onsubmit="event.preventDefault(); changePassword();">
    <div class="change-pass-heading-top"><span>bảo mật tài khoản</span></div>
    <div class="change-pass-title-2"><span>PASSWORD</span></div>

    <div class="input-container">
      <input type="password" id="old-pass" class="input-pwd" placeholder="Mật khẩu cũ" />
    </div>

    <section class="bg-stars">
      <span class="star"></span>
      <span class="star"></span>
      <span class="star"></span>
      <span class="star"></span>
    </section>

      <input type="password" id="new-pass-change" class="input-pwd" placeholder="Mật khẩu mới" />
    </div>

    <div class="input-container">
      <input type="password" id="confirm-pass-change" class="input-pwd" placeholder="Nhập lại mật khẩu mới" />
    </div>

    <div class="change-pass-actions">
      <button type="button" class="change-pass-cancel" onclick="closeChangePassword()">Hủy</button>
      <button type="submit" class="change-pass-submit" id="change-pass-btn">Đổi mật khẩu</button>
    </div>

<script>
    // DÁN LẠI LINK APP SCRIPT MỚI NHẤT VÀO ĐÂY:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMD5m75ScvyBrI9gWVnHch6ul2TyDic_3Dh5MSxFDdcf-5VCeLpdSALjM91Uq4Jrk/exec"; 
    
    let currentUser = "";
    let serverData = {}; 
    let accountList = []; 
    let currentShift = "ALL"; 
    let currentSearch = ""; 
    let loginLoading = false;
    let initialDataPromise = null;
    let currentRole = "";
    let currentPass = "";

    const fullTimeSlots = [];
    for(let h=0; h<24; h++) {
        let hr = h < 10 ? "0"+h : h;
        fullTimeSlots.push(hr + ":00");
        fullTimeSlots.push(hr + ":30");
    }

    function loadServerData() {
        if (serverData.taikhoan && serverData.congnhan && serverData.thongke) {
            return Promise.resolve(serverData);
        }

        if (initialDataPromise) {
            return initialDataPromise;
        }

        initialDataPromise = fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                serverData = data || {};
                accountList = Array.isArray(serverData.taikhoan) ? serverData.taikhoan : [];
                return serverData;
            })
            .catch(err => {
                initialDataPromise = null;
                throw err;
            });

        return initialDataPromise;
    }

    window.onload = function() {
        loadServerData().catch(e => console.log("Lỗi tải ngầm", e));
    };

    async function login() {
    const u = document.getElementById('user').value.trim().toUpperCase();
    const p = document.getElementById('pass').value.trim();
    const btn = document.getElementById('login-btn');

    if (!u || !p) return alert("Vui lòng nhập tài khoản và mật khẩu!");

    btn.disabled = true;
    btn.innerText = "ĐANG VÀO HỆ THỐNG...";
    showLoginLoader();

    try {
        if (accountList.length === 0) {
            await loadServerData();
        }

        const foundUser = accountList.find(acc =>
            acc[0]?.toString().toUpperCase() === u &&
            acc[1]?.toString() === p
        );

        if (!foundUser) {
            hideLoginLoader();
            btn.disabled = false;
            btn.innerText = "VÀO HỆ THỐNG";
            return alert("Sai tài khoản hoặc mật khẩu!");
        }

        currentUser = u;
        currentPass = p;
        currentRole = foundUser[2];

        document.getElementById("acc-display").innerText = `👤 ${u} (${currentRole})`;
        const loginUI = document.getElementById("login-ui");
        const appHeader = document.getElementById("app-header");
        const loadingUI = document.getElementById("loading");
        if (loginUI) {
            loginUI.style.display = "none";
            loginUI.classList.add("hidden-login");
        }
        if (appHeader) appHeader.style.display = "flex";
        if (loadingUI) loadingUI.style.display = "block";

        setTimeout(() => {
            try {
                renderMainMenu();
                document.getElementById("loading").style.display = "none";
            } catch (err) {
                console.error("Lỗi renderMainMenu:", err);
                alert("Đăng nhập thành công nhưng lỗi khi tải giao diện!");
            } finally {
                hideLoginLoader();
                btn.disabled = false;
                btn.innerText = "VÀO HỆ THỐNG";
            }
        }, 700);

    } catch (err) {
        console.error("Lỗi login:", err);
        hideLoginLoader();
        btn.disabled = false;
        btn.innerText = "VÀO HỆ THỐNG";
        alert("Có lỗi khi đăng nhập!");
    }
}
function openChangePassword() {
    document.getElementById('change-pass-modal').classList.add('show');
    document.getElementById('old-pass').value = '';
    document.getElementById('new-pass-change').value = '';
    document.getElementById('confirm-pass-change').value = '';
}

function closeChangePassword() {
    document.getElementById('change-pass-modal').classList.remove('show');
}

async function changePassword() {
    const oldPass = document.getElementById('old-pass').value.trim();
    const newPass = document.getElementById('new-pass-change').value.trim();
    const confirmPass = document.getElementById('confirm-pass-change').value.trim();
    const btn = document.getElementById('change-pass-btn');

    if (!oldPass || !newPass || !confirmPass) {
        return alert("Vui lòng nhập đầy đủ thông tin!");
    }

    if (newPass !== confirmPass) {
        return alert("Mật khẩu mới nhập lại không khớp!");
    }

    if (newPass.length < 4) {
        return alert("Mật khẩu mới phải từ 4 ký tự trở lên!");
    }

    btn.disabled = true;
    btn.innerText = "Đang đổi...";

    try {
        const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "doi_mat_khau",
                user: currentUser,
                oldPass: oldPass,
                newPass: newPass
            })
        });

        const text = await res.text();

        if (text.toLowerCase().includes("thành công")) {
            alert("Đổi mật khẩu thành công!");
            closeChangePassword();

            const acc = accountList.find(a => a[0] && a[0].toString().toUpperCase() === currentUser);
            if (acc) acc[1] = newPass;
        } else {
            alert(text);
        }
    } catch (e) {
        alert("Lỗi kết nối khi đổi mật khẩu!");
    } finally {
        btn.disabled = false;
        btn.innerText = "Đổi";
    }
}
    function switchNav(viewName) {
        document.getElementById('nav-chamcong').classList.remove('active');
        document.getElementById('nav-thongke').classList.remove('active');
        document.getElementById('nav-' + viewName).classList.add('active');

        if(viewName === 'chamcong') {
            document.getElementById('chamcong-view').style.display = 'block';
            document.getElementById('thongke-view').style.display = 'none';
        } else {
            document.getElementById('chamcong-view').style.display = 'none';
            document.getElementById('thongke-view').style.display = 'block';
        }
    }
function showLoginLoader() {
    const el = document.getElementById('login-loading-overlay');
    if (el) el.classList.add('show');
}

function hideLoginLoader() {
    const el = document.getElementById('login-loading-overlay');
    if (el) el.classList.remove('show');
}
    // =====================================
    // RENDER THỐNG KÊ CÓ GIAO DIỆN 5 Ô CÂN ĐỐI
    // =====================================
function renderMainMenu() {
    const loginUI = document.getElementById('login-ui');
    if (loginUI) {
        loginUI.style.display = 'none';
        loginUI.classList.add('hidden-login');
    }
    document.getElementById('loading').style.display = 'none';

    if (currentRole === 'ADMIN') {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('admin-ui').style.display = 'block';
        renderAdminList();
        return;
    }

    document.getElementById('admin-ui').style.display = 'none';
    document.getElementById('main-ui').style.display = 'block';

    populateShiftFilter();
    switchNav('chamcong');
    switchTab('chua');
    renderWorkerList();
    renderThongKe();
}    
function renderThongKe() {
        const tkView = document.getElementById('thongke-list');
        const searchVal = document.getElementById('search-tk').value.toUpperCase().trim();
        
        let myData = (serverData.thongke || []).filter(r => r.acc === currentUser);

        if(myData.length === 0) {
            tkView.innerHTML = `<div class="worker-card" style="text-align:center;">Tháng này chưa có dữ liệu chấm công nào!</div>`;
            return;
        }

        const shiftMap = {};
        serverData.congnhan.forEach(w => {
            shiftMap[w[0]] = w[5] ? w[5].toString().toUpperCase().trim() : "F";
        });

        const grouped = {};
        myData.forEach(row => {
            if(!grouped[row.id]) {
                grouped[row.id] = { ten: row.ten, details: [], totalTCT: 0, normalDays: 0, sunDays: 0, normalOT: 0, sundayOT: 0 };
            }
            
            let shift = shiftMap[row.id] || "F";
            let lenca = row.lenca ? row.lenca.toString().replace(/\D/g, '') : "";
            let xuongca = row.xuongca ? row.xuongca.toString().replace(/\D/g, '') : "";
            let ot = 0; 
            
            // THUẬT TOÁN TÍNH TĂNG CA CHO 3 CA
            let hL = lenca.length >= 4 ? parseInt(lenca.substring(0,2)) : null;
            let mL = lenca.length >= 4 ? parseInt(lenca.substring(2,4)) : null;
            let minL = hL !== null ? (hL * 60 + mL) : null; 

            let hX = xuongca.length >= 4 ? parseInt(xuongca.substring(0,2)) : null;
            let mX = xuongca.length >= 4 ? parseInt(xuongca.substring(2,4)) : null;
            let minX = hX !== null ? (hX * 60 + mX) : null; 

            if (shift === "F") {
                if (minL !== null && minL < 450 && minL > 300) ot += (450 - minL) / 60; 
                if (minX !== null && minX > 990) ot += (minX - 990) / 60; 
            } else if (shift === "C") {
                if (minL !== null && minL < 450 && minL > 300) ot += (450 - minL) / 60; 
                if (minX !== null && minX > 930) ot += (minX - 930) / 60; 
            } else if (shift === "S") {
                if (minL !== null && minL < 1320 && minL > 720) ot += (1320 - minL) / 60; 
                if (minX !== null && minX > 360 && minX < 720) ot += (minX - 360) / 60; 
            }

            if (row.isSunday) {
                grouped[row.id].sunDays++;
                grouped[row.id].sundayOT += ot; 
            } else {
                grouped[row.id].normalDays++;
                grouped[row.id].normalOT += ot; 
            }
            
            grouped[row.id].totalTCT += Number(row.tct) || 0; 
            row.calcOTThisDay = ot; 
            grouped[row.id].details.push(row);
        });

        let html = "";
        for (const [id, worker] of Object.entries(grouped)) {
            if (searchVal !== "" && !worker.ten.toUpperCase().includes(searchVal) && !id.includes(searchVal)) {
                continue; 
            }

            worker.details.sort((a,b) => b.ngay.localeCompare(a.ngay));

            let detailsHtml = worker.details.map(d => `
                <div class="stat-row" style="${d.isSunday ? 'background:#fffbeb; padding:8px; border-radius:6px;' : 'padding:8px 0;'}">
                    <b>🗓️ ${d.ngay} ${d.isSunday ? '<span style="color:#d97706">(CN)</span>' : ''}</b>
                    <span>${displayTime(d.lenca)} ➡️ ${displayTime(d.xuongca)}</span>
                    <div style="text-align:right">
                        <div style="color:#15803d; font-size:11px; font-weight:bold">+${d.calcOTThisDay.toFixed(1)}h TC</div>
                        <div style="color:var(--danger); font-size:11px; font-weight:bold">TCT: ${d.tct || 0}</div>
                    </div>
                </div>
            `).join('');

            html += `
            <div class="worker-card">
                <div class="w-name">👤 ${worker.ten}</div>
                <div class="w-details"><span class="badge">Thẻ: ${id}</span> <span class="badge badge-shift">Ca: ${shiftMap[id]}</span></div>
                
                <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
                    <div style="flex: 1 1 30%; background:var(--primary-light); color:var(--primary); padding:10px 5px; border-radius:10px; text-align:center;">
                        <div style="font-size:16px; font-weight:bold;">${worker.normalDays}</div><div style="font-size:10px; font-weight:bold;">Ngày Thường</div>
                    </div>
                    <div style="flex: 1 1 30%; background:#fef3c7; color:#d97706; padding:10px 5px; border-radius:10px; text-align:center;">
                        <div style="font-size:16px; font-weight:bold;">${worker.sunDays}</div><div style="font-size:10px; font-weight:bold;">Chủ Nhật</div>
                    </div>
                    <div style="flex: 1 1 30%; background:#fee2e2; color:var(--danger); padding:10px 5px; border-radius:10px; text-align:center;">
                        <div style="font-size:16px; font-weight:bold;">${worker.totalTCT}</div><div style="font-size:10px; font-weight:bold;">TCT</div>
                    </div>
                    <div style="flex: 1 1 45%; background:#dcfce7; color:#15803d; padding:10px 5px; border-radius:10px; text-align:center;">
                        <div style="font-size:16px; font-weight:bold;">${worker.normalOT.toFixed(1)}</div><div style="font-size:10px; font-weight:bold;">TC THƯỜNG (h)</div>
                    </div>
                    <div style="flex: 1 1 45%; background:#ffedd5; color:#c2410c; padding:10px 5px; border-radius:10px; text-align:center;">
                        <div style="font-size:16px; font-weight:bold;">${worker.sundayOT.toFixed(1)}</div><div style="font-size:10px; font-weight:bold;">TC CHỦ NHẬT (h)</div>
                    </div>
                </div>

                <details>
                    <summary>Xem chi tiết từng ngày</summary>
                    <div style="margin-top:10px; background:#f9fafb; padding:10px; border-radius:8px; border: 1px solid #e5e7eb;">
                        ${detailsHtml}
                    </div>
                </details>
            </div>`;
        }
        tkView.innerHTML = html || `<div class="worker-card" style="text-align:center;">Không tìm thấy nhân viên!</div>`;
    }

    // =====================================
    // LOGIC CHẤM CÔNG VÀ LƯU 
    // =====================================
    function populateShiftFilter() {
        const userWorkers = serverData.congnhan.filter(r => r[4] && r[4].toString().toUpperCase().trim() === currentUser);
        const uniqueShifts = [...new Set(userWorkers.map(r => r[5] ? r[5].toString().trim().toUpperCase() : "").filter(s => s !== ""))].sort();
        const shiftSelect = document.getElementById('shift-filter');
        let optionsHtml = `<option value="ALL">📋 Hiển thị Tất cả các Ca</option>`;
        uniqueShifts.forEach(shift => { optionsHtml += `<option value="${shift}">⚙️ Chỉ xem Ca ${shift}</option>`; });
        shiftSelect.innerHTML = optionsHtml;
    }

    function filterData() {
        currentShift = document.getElementById('shift-filter').value;
        currentSearch = document.getElementById('search-input').value.toUpperCase().trim();
        renderWorkerList(); 
    }

    function switchTab(tabName) {
        document.getElementById('btn-chua').classList.remove('active');
        document.getElementById('btn-da').classList.remove('active');
        document.getElementById('btn-' + tabName).classList.add('active');

        if (tabName === 'chua') {
            document.getElementById('list-chua-cham').style.display = 'block';
            document.getElementById('list-da-cham').style.display = 'none';
            document.getElementById('save-btn').style.display = 'block'; 
        } else {
            document.getElementById('list-chua-cham').style.display = 'none';
            document.getElementById('list-da-cham').style.display = 'block';
            document.getElementById('save-btn').style.display = 'none'; 
        }
    }

    function displayTime(raw) {
        if (!raw) return "--:--"; 
        let clean = raw.toString().replace(/\D/g, ''); 
        if (clean.length >= 4) return clean.substring(0, 2) + ":" + clean.substring(2, 4);
        return raw;
    }

    
function updateWorkerCardState(card) {
  if (!card) return;

  const lenCa = card.querySelector('.in-lenca')?.value.trim() || "";
  const xuongCa = card.querySelector('.in-xuongca')?.value.trim() || "";
  const tct = card.querySelector('.in-tct')?.value.trim() || "";

  if (lenCa !== "" || xuongCa !== "" || tct !== "") {
    card.classList.add('has-input');
  } else {
    card.classList.remove('has-input');
  }
}

function bindWorkerCardInputEvents() {
  document.querySelectorAll('.active-card').forEach(card => {
    const inputs = card.querySelectorAll('.in-lenca, .in-xuongca, .in-tct');
    inputs.forEach(input => {
      input.addEventListener('input', () => updateWorkerCardState(card));
      input.addEventListener('change', () => updateWorkerCardState(card));
    });
    updateWorkerCardState(card);
  });
}


function renderWorkerList() {
        let filtered = serverData.congnhan.filter(r => r[4] && r[4].toString().toUpperCase().trim() === currentUser);
        if (currentShift !== "ALL") filtered = filtered.filter(r => r[5] && r[5].toString().toUpperCase().trim() === currentShift);
        if (currentSearch !== "") {
            filtered = filtered.filter(r => {
                const id = r[0] ? r[0].toString().toUpperCase() : "";
                const name = r[1] ? r[1].toString().toUpperCase() : "";
                return id.includes(currentSearch) || name.includes(currentSearch);
            });
        }

        if (filtered.length === 0) {
            document.getElementById('list-chua-cham').innerHTML = `<div class="worker-card" style="text-align:center; color:var(--danger)">Không tìm thấy công nhân phù hợp!</div>`;
            document.getElementById('list-da-cham').innerHTML = `<div class="worker-card" style="text-align:center; color:var(--danger)">Không có dữ liệu!</div>`;
            document.getElementById('btn-chua').innerText = `CHƯA CHẤM (0)`; document.getElementById('btn-da').innerText = `ĐÃ LƯU (0)`; return;
        }

        let htmlChua = "", htmlDa = "", countChua = 0, countDa = 0;

        filtered.forEach(w => {
            const isRecorded = w[w.length - 4], savedLenCa = w[w.length - 3], savedXuongCa = w[w.length - 2], savedTCT = w[w.length - 1];

            if (isRecorded === true) {
                countDa++;
                htmlDa += `
                <div class="worker-card disabled-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="w-name">👤 ${w[1]}</div> <span class="status-badge">✓ ĐÃ LƯU</span>
                    </div>
                    <div class="w-details"><span class="badge">Thẻ: ${w[0]}</span> <span class="badge badge-shift">Ca: ${w[5]}</span></div>
                    <div class="time-row">
                        <div class="time-wrapper"><label>LÊN CA</label><input type="text" class="time-input" disabled value="${displayTime(savedLenCa)}"></div>
                        <div class="time-wrapper"><label>XUỐNG CA</label><input type="text" class="time-input" disabled value="${displayTime(savedXuongCa)}"></div>
                        <div class="time-wrapper"><label>TCT</label><input type="text" class="time-input" disabled value="${savedTCT}"></div>
                    </div>
                </div>`;
            } else {
                countChua++;
                htmlChua += `
                <div class="worker-card active-card">
                    <div class="w-name">👤 ${w[1]}</div>
                    <div class="w-details"><span class="badge">Thẻ: ${w[0]}</span> <span class="badge">Bậc: ${w[2]}</span> <span class="badge">Chuyền: ${w[3]}</span> <span class="badge badge-shift">Ca: ${w[5]}</span></div>
                    <div class="time-row">
                        <div class="time-wrapper">
                            <label>GIỜ LÊN CA</label>
                            <input type="text" inputmode="decimal" class="time-input in-lenca" 
                                onfocus="renderSuggestions(this)" onclick="renderSuggestions(this)" oninput="renderSuggestions(this)" onchange="formatTime(this)"
                                data-id="${w[0]}" data-name="${w[1]}" data-capbac="${w[2]}" data-chuyen="${w[3]}" placeholder="--:--">
                        </div>
                        <div class="time-wrapper">
                            <label>GIỜ XUỐNG CA</label>
                            <input type="text" inputmode="decimal" class="time-input in-xuongca" 
                                onfocus="renderSuggestions(this)" onclick="renderSuggestions(this)" oninput="renderSuggestions(this)" onchange="formatTime(this)" placeholder="--:--">
                        </div>
                        <div class="time-wrapper">
                            <label>TCT</label>
                            <input type="number" step="0.5" inputmode="decimal" class="time-input in-tct" placeholder="">
                        </div>
                    </div>
                </div>`;
            }
        });

        document.getElementById('list-chua-cham').innerHTML = htmlChua || `<div class="worker-card" style="text-align:center; color:var(--success); font-weight:bold;">Tất cả đã chấm xong!</div>`;
        document.getElementById('list-da-cham').innerHTML = htmlDa || `<div class="worker-card" style="text-align:center;">Chưa có dữ liệu.</div>`;
        document.getElementById('btn-chua').innerText = `CHƯA CHẤM (${countChua})`; document.getElementById('btn-da').innerText = `ĐÃ LƯU (${countDa})`;
        bindWorkerCardInputEvents();
    }

    function renderSuggestions(inputNode) {
  closeAllSuggestions();

  const val = inputNode.value.trim().replace(/\D/g, '');
  let slotsToShow = [...fullTimeSlots];

  if (val !== "") {
    const startsWithHour = [];
    const startsWithRaw = [];
    const includesRaw = [];

    slotsToShow.forEach(time => {
      const hourText = String(parseInt(time.split(':')[0], 10));
      const rawText = time.replace(':', '');

      if (hourText === val || time.startsWith(val + ':')) {
        startsWithHour.push(time);
      } else if (rawText.startsWith(val)) {
        startsWithRaw.push(time);
      } else if (rawText.includes(val)) {
        includesRaw.push(time);
      }
    });

    slotsToShow = [...startsWithHour, ...startsWithRaw, ...includesRaw];
  }

  if (slotsToShow.length === 0) return;

  const wrapper = inputNode.closest('.time-wrapper');
const card = inputNode.closest('.worker-card');
if (card) card.classList.add('suggestion-layer');
  if (!wrapper) return;

  const dropBox = document.createElement("div");
  dropBox.className = "suggestions-box";
  wrapper.appendChild(dropBox);

  slotsToShow.forEach(time => {
    const item = document.createElement("div");
    item.className = "suggestion-item";
    item.innerText = time;

    if (inputNode.value === time) {
      item.classList.add("active-suggestion");
    }

    item.onmousedown = function(e) {
      e.preventDefault();
      inputNode.value = time;
      closeAllSuggestions();
      inputNode.blur();
    };

    item.ontouchstart = function(e) {
      e.preventDefault();
      inputNode.value = time;
      closeAllSuggestions();
      inputNode.blur();
    };

    dropBox.appendChild(item);
  });

  const targetTime = val ? slotsToShow[0] : "07:00";
  const targetIndex = slotsToShow.indexOf(targetTime);
  if (targetIndex >= 0) {
    setTimeout(() => {
      const firstItem = dropBox.querySelector('.suggestion-item');
      const itemHeight = firstItem ? firstItem.offsetHeight + 10 : (window.innerWidth <= 768 ? 70 : 62);
      dropBox.scrollTop = Math.max(0, targetIndex * itemHeight - itemHeight);
    }, 10);
  }
}

function closeAllSuggestions() {
  document.querySelectorAll('.suggestions-box').forEach(box => box.remove());
  document.querySelectorAll('.suggestion-layer').forEach(el => el.classList.remove('suggestion-layer'));
  document.body.classList.remove("suggestion-open");
}

function isInsideSuggestionArea(target) {
  return !!target.closest('.time-wrapper') || !!target.closest('.suggestions-box');
}

document.addEventListener('pointerdown', function(e) {
  if (!isInsideSuggestionArea(e.target)) {
    closeAllSuggestions();
  }
});

document.addEventListener('touchstart', function(e) {
  if (!isInsideSuggestionArea(e.target)) {
    closeAllSuggestions();
  }
}, { passive: true });

document.addEventListener('focusin', function(e) {
  if (!isInsideSuggestionArea(e.target)) {
    closeAllSuggestions();
  }
});

if (window.innerWidth > 768) {
  window.addEventListener("scroll", closeAllSuggestions, true);
  window.addEventListener("resize", closeAllSuggestions);
}

    function formatTime(input) {
        let val = input.value.trim().replace(',', '.'); if (!val) return;
        if (/^\d{3,4}$/.test(val)) { input.value = val.padStart(4, '0').substring(0, 2) + ":" + val.padStart(4, '0').substring(2, 4); return; }
        if (/^\d{1,2}$/.test(val)) input.value = (parseInt(val) < 10 ? "0"+parseInt(val) : parseInt(val)) + ":00";
        else if (/^\d{1,2}\.5$/.test(val)) input.value = (parseInt(val.split('.')[0]) < 10 ? "0"+parseInt(val.split('.')[0]) : parseInt(val.split('.')[0])) + ":30";
    }

    function timeTo6Digits(timeStr) {
        if (!timeStr) return "";
        let clean = timeStr.replace(/\D/g, ''); 
        if (clean.length === 3) clean = "0" + clean; 
        if (clean.length === 4) return "'" + clean + "00";
        return "'" + clean;
    }

    // BẮT BỘ LỖI KHI BẤM LƯU & CẬP NHẬT NGẦM
    async function saveWorkerData() {
        const btn = document.getElementById('save-btn'); const cards = document.querySelectorAll('.active-card');
        const payloadData = []; let hasError = false; let errorMsg = "";

        document.querySelectorAll('.time-input').forEach(input => input.style.border = "none");

        cards.forEach(c => {
            const lencaIn = c.querySelector('.in-lenca'), xuongcaIn = c.querySelector('.in-xuongca');
            const lenca = lencaIn.value.trim(), xuongca = xuongcaIn.value.trim(), tct = c.querySelector('.in-tct').value.trim(); 

            if (lenca !== "" || xuongca !== "" || tct !== "") {
                if (lenca === "" || xuongca === "") {
                    hasError = true;
                    if (errorMsg === "") errorMsg = `Vui lòng nhập đầy đủ LÊN CA và XUỐNG CA cho:\n👤 ${lencaIn.dataset.name}`;
                    if (lenca === "") lencaIn.style.border = "2px solid var(--danger)";
                    if (xuongca === "") xuongcaIn.style.border = "2px solid var(--danger)";
                } else {
                    payloadData.push({ id: lencaIn.dataset.id, name: lencaIn.dataset.name, capbac: lencaIn.dataset.capbac, chuyen: lencaIn.dataset.chuyen, acc: currentUser, lenca: timeTo6Digits(lenca), xuongca: timeTo6Digits(xuongca), tct: tct });
                }
            }
        });

        if (hasError) return alert(errorMsg + "\n\n(Các ô bị thiếu đã khoanh đỏ 🔴)");
        if (payloadData.length === 0) return alert("Không có dữ liệu mới!");
        
        btn.disabled = true; btn.innerText = "Đang lưu...";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "chamcong", data: payloadData }) });
            alert("Đã chấm công thành công!"); btn.disabled = false; btn.innerText = "CHẤM CÔNG (LƯU)"; reloadData(); 
        } catch (e) { alert("Lỗi kết nối!"); btn.disabled = false; btn.innerText = "CHẤM CÔNG (LƯU)"; }
    }

    async function reloadData() {
        document.getElementById('main-ui').style.display = 'none'; document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(SCRIPT_URL); serverData = await res.json();
            accountList = Array.isArray(serverData.taikhoan) ? serverData.taikhoan : accountList;
            initialDataPromise = Promise.resolve(serverData);
            document.getElementById('loading').style.display = 'none'; document.getElementById('main-ui').style.display = 'block';
            renderWorkerList(); renderThongKe(); 
        } catch (e) { alert("Lỗi tải dữ liệu!"); }
    }

    // =====================================
    // QUẢN LÝ ADMIN
    // =====================================
    function renderAdminList() {
        document.getElementById('admin-user-list').innerHTML = accountList.map((acc, i) => !acc[0] ? "" : `
            <div class="admin-card">
                <div><div style="font-size:16px; font-weight:bold; color:var(--text-main)">${acc[0]}</div><div style="font-size:12px; color:var(--text-muted)">Quyền: <b style="color:${acc[2]=='ADMIN'?'var(--danger)':'var(--success)'}">${acc[2]}</b></div></div>
                <div style="display:flex; gap:8px;"><button class="admin-action-btn btn-edit" onclick="changePass(${i})">Đổi Pass</button><button class="admin-action-btn btn-del" onclick="deleteAccount(${i})">Xóa</button></div>
            </div>`).join('');
    }
    function addAccount() {
        const u = document.getElementById('new-user').value.toUpperCase().trim(), p = document.getElementById('new-pass').value.trim(), r = document.getElementById('new-role').value;
        if(u==="" || p==="") return alert("Vui lòng nhập Tên và Mật khẩu!");
        if(accountList.find(acc => acc[0] && acc[0].toString().toUpperCase() === u)) return alert("Tài khoản đã tồn tại!");
        accountList.push([u, p, r]); document.getElementById('new-user').value = ""; document.getElementById('new-pass').value = ""; alert("Đã thêm tạm thời! Nhớ bấm LƯU THAY ĐỔI."); renderAdminList();
    }
    function deleteAccount(i) { if(confirm(`Xóa tài khoản ${accountList[i][0]}?`)) { accountList.splice(i, 1); renderAdminList(); } }
    function changePass(i) { const newPass = prompt(`Pass mới cho ${accountList[i][0]}:`); if(newPass && newPass.trim() !== "") { accountList[i][1] = newPass.trim(); alert("Đã đổi pass tạm thời! Nhớ LƯU THAY ĐỔI."); } }
    async function saveAdminData() {
        if(!confirm("Xác nhận lưu lên máy chủ?")) return;
        try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "quanly_taikhoan", data: accountList }) }); alert("Thành công!"); location.reload(); } catch (e) { alert("Lỗi!"); }
    }
